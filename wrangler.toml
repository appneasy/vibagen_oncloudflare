name = "vibagen-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "vibagen-db"
database_id = "REPLACE_WITH_ACTUAL_ID_AFTER_wrangler_d1_create"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_ACTUAL_ID_AFTER_wrangler_kv_create"

[vars]
NEXT_PUBLIC_SITE_URL = "https://vibagen.com"
